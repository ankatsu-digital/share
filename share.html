<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ファイルの受け取り</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

<div class="card" id="mainCard">
  <h1><span class="eyebrow">Secure Handover</span>ファイルの受け取り</h1>
  <div id="loadingMsg" class="subtitle">読み込み中...</div>

  <div id="content" style="display:none;">
    <p class="subtitle">ログインIDを確認してください。パスワードは自動でメールに届きます。</p>

    <div class="login-id-box">
      <div class="eyebrow-label">Login ID</div>
      <div class="value" id="loginIdDisplay">----</div>
    </div>
    <div class="status-text" id="statusText"></div>

    <label for="inputLoginId">ログインID</label>
    <input type="text" id="inputLoginId">

    <label for="inputPassword">パスワード(メールで届きます)</label>
    <input type="password" id="inputPassword">

    <button id="verifyBtn">確認する</button>
    <div id="mainMsg"></div>
    <div id="downloadArea"></div>
  </div>
</div>

</div>
<script src="config.js"></script>
<script src="share.js"></script>
</body>
</html>
