<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ファイルの受け取り</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
  --ink: #1c2b3a;
  --paper: #f0f2f5;
  --panel: #ffffff;
  --line: #dbe0e6;
  --muted: #6b7688;
  --accent: #8a3324;
  --accent-dark: #6e2818;
  --success: #2f6b4f;
  --error: #a3372a;
  --info: #2c4a6e;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; width: 100%; min-height: 100%; }
body {
  font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", "Segoe UI", sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 16px;
  line-height: 1.6;
}
.wrap { width: 100%; max-width: 460px; }
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 28px 24px;
  width: 100%;
  box-shadow: 0 1px 2px rgba(28,43,58,0.05);
  margin-bottom: 20px;
}
h1 { font-size: 20px; font-weight: 700; margin: 0 0 4px; color: var(--ink); }
.eyebrow {
  display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
  color: var(--accent); text-transform: uppercase; margin-bottom: 6px;
}
.subtitle { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
label { display: block; font-size: 13px; font-weight: 600; margin: 16px 0 6px; color: var(--ink); }
input[type="text"], input[type="password"] {
  display: block; width: 100%; max-width: 100%; padding: 10px 12px;
  border: 1px solid var(--line); border-radius: 6px; font-size: 14px;
  background: #fff; font-family: inherit; color: var(--ink);
}
input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(138,51,36,0.12); }
button {
  display: block; margin-top: 20px; width: 100%; padding: 11px;
  background: var(--accent); color: #fff; border: none; border-radius: 6px;
  font-size: 14px; font-weight: 700; cursor: pointer;
}
button:hover { background: var(--accent-dark); }
button:disabled { background: #b8bfc8; cursor: not-allowed; }
button.secondary { background: var(--success); }
button.secondary:hover { background: #244f39; }
.msg { margin-top: 14px; font-size: 13px; padding: 10px 12px; border-radius: 6px; }
.msg.error { background: #fbf0ee; color: var(--error); }
.msg.success { background: #eef5f0; color: var(--success); }
.msg.info { background: #eef2f6; color: var(--info); }

/* 情報行(誰から・期限など) */
.info-box {
  background: var(--paper); border: 1px solid var(--line); border-radius: 6px;
  padding: 14px 16px; margin-bottom: 16px; font-size: 13px;
}
.info-box .row { display: flex; justify-content: space-between; gap: 12px; padding: 4px 0; }
.info-box .row .k { color: var(--muted); flex-shrink: 0; }
.info-box .row .v { color: var(--ink); font-weight: 600; text-align: right; word-break: break-word; }

.login-id-box {
  text-align: center; padding: 20px 12px; background: var(--paper);
  border: 1px dashed var(--line); border-radius: 6px; margin-bottom: 6px;
}
.login-id-box .eyebrow-label {
  font-size: 11px; letter-spacing: 0.08em; color: var(--muted);
  text-transform: uppercase; margin-bottom: 6px;
}
.login-id-box .value {
  font-family: "SFMono-Regular", Consolas, Menlo, monospace; font-size: 28px;
  font-weight: 700; letter-spacing: 0.08em; color: var(--accent); word-break: break-all;
}
.status-text { text-align: center; font-size: 12.5px; color: var(--muted); margin-top: 8px; }

/* ローディング画面 */
.loading-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 20px; text-align: center;
}
.spinner {
  width: 34px; height: 34px; border: 3px solid var(--line);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-screen p { color: var(--muted); font-size: 13px; margin: 0; }

/* 認証成功画面 */
.success-screen { text-align: center; }
.success-icon {
  width: 56px; height: 56px; border-radius: 50%; background: #eef5f0;
  display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;
}
.success-icon svg { width: 28px; height: 28px; }
.success-title { font-size: 18px; font-weight: 700; color: var(--success); margin: 0 0 4px; }
.success-sub { font-size: 13px; color: var(--muted); margin: 0 0 20px; }

.file-list { text-align: left; margin-top: 8px; }
.file-item {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  border: 1px solid var(--line); border-radius: 6px; padding: 12px 14px; margin-bottom: 8px;
  font-size: 13px;
}
.file-item .name { word-break: break-all; }
.file-item button {
  margin-top: 0; width: auto; padding: 7px 14px; font-size: 12px; flex-shrink: 0;
}

.progress-inline {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 14px; font-weight: 700;
}
.progress-inline .mini-spinner {
  width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4);
  border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite;
}

.field-hint { font-size: 11.5px; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>
<div class="wrap">

<div class="card" id="loadingCard">
  <div class="loading-screen">
    <div class="spinner"></div>
    <p id="loadingText">読み込み中...</p>
  </div>
</div>

<div class="card" id="mainCard" style="display:none;">
  <h1><span class="eyebrow">Secure Handover</span>ファイルの受け取り</h1>
  <p class="subtitle" id="shareSubtitle">ログインIDを確認してください。パスワードは自動でメールに届きます。</p>

  <div class="info-box" id="infoBox"></div>

  <div id="idPasswordSection">
    <div class="login-id-box">
      <div class="eyebrow-label">Login ID</div>
      <div class="value" id="loginIdDisplay">----</div>
    </div>
    <div class="status-text" id="statusText"></div>

    <label for="inputLoginId">ログインID</label>
    <input type="text" id="inputLoginId">

    <label for="inputPassword">パスワード(メールで届きます)</label>
    <input type="password" id="inputPassword">

    <button id="verifyBtn"><span id="verifyBtnLabel">確認する</span></button>
  </div>

  <div id="linkOnlySection" style="display:none;">
    <p class="subtitle" style="margin-bottom:0;">ID・パスワードは不要です。ボタンを押すとすぐにダウンロードできます。</p>
    <button id="linkOnlyBtn"><span id="linkOnlyBtnLabel">ダウンロードの準備をする</span></button>
  </div>

  <div id="mainMsg"></div>
</div>

<div class="card success-screen" id="successCard" style="display:none;">
  <div class="success-icon">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 6L9 17l-5-5" stroke="#2f6b4f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="success-title">認証に成功しました</div>
  <div class="success-sub" id="remainingText"></div>

  <div class="file-list" id="fileList"></div>

  <button class="secondary" id="downloadAllBtn" style="display:none;">すべてまとめてダウンロード(ZIP)</button>
  <div id="downloadMsg"></div>
</div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="config.js"></script>
<script src="share.js"></script>
</body>
</html>
